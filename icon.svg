<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="100%" stop-color="#0d0d0f"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="114" fill="url(#bg)"/>

  <!-- Track ring -->
  <circle cx="256" cy="256" r="108" fill="none" stroke="rgba(255,255,255,0.10)" stroke-width="6"/>

  <!-- Progress arc -->
  <circle cx="256" cy="256" r="108" fill="none" stroke="white" stroke-width="6"
          stroke-linecap="round" stroke-dasharray="678.6" stroke-dashoffset="180"
          transform="rotate(-90,256,256)" filter="url(#glow)"/>
</svg>
