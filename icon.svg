<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Timer ring track -->
  <circle cx="230" cy="230" r="130" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="11" stroke-linecap="round"/>

  <!-- Timer ring progress -->
  <circle cx="230" cy="230" r="130" fill="none" stroke="rgba(255,255,255,0.85)" stroke-width="11"
          stroke-linecap="round" stroke-dasharray="817" stroke-dashoffset="200"
          transform="rotate(-90,230,230)"/>

  <!-- Time -->
  <text x="230" y="250" text-anchor="middle" font-family="-apple-system,Helvetica Neue,sans-serif"
        font-size="80" font-weight="200" fill="white">25</text>

  <!-- Label -->
  <text x="230" y="340" text-anchor="middle" font-family="-apple-system,Helvetica Neue,sans-serif"
        font-size="28" font-weight="500" fill="rgba(255,255,255,0.7)" letter-spacing="4">STUDY</text>
</svg>
