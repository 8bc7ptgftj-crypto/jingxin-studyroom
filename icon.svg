<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="1" y="1" width="510" height="510" rx="111" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Timer ring track -->
  <circle cx="256" cy="236" r="120" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>

  <!-- Timer ring progress (~65%) -->
  <circle cx="256" cy="236" r="120" fill="none" stroke="white" stroke-width="8"
          stroke-linecap="round" stroke-dasharray="754" stroke-dashoffset="264"
          transform="rotate(-90,256,236)" filter="url(#glow)"/>

  <!-- Center dot -->
  <circle cx="256" cy="236" r="5" fill="white" opacity="0.6"/>
</svg>
